<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yello Explains</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #111; }
  header { background: #F5C518; padding: 32px 24px; text-align: center; }
  header h1 { font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; }
  header p { font-size: 1.1rem; margin-top: 8px; color: #333; }
  .episodes { max-width: 900px; margin: 48px auto; padding: 0 24px; }
  .episodes h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 24px; }
  .card { display: flex; gap: 24px; border: 2px solid #111; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .card iframe { width: 180px; min-width: 180px; height: 320px; border: none; border-radius: 8px; }
  .card-body h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; }
  .card-body .topic { display: inline-block; background: #F5C518; font-size: 0.75rem; font-weight: 700; padding: 2px 10px; border-radius: 20px; margin-bottom: 12px; }
  .card-body p { font-size: 0.95rem; line-height: 1.6; color: #333; }
  .card-body a { display: inline-block; margin-top: 14px; background: #111; color: #fff; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.9rem; }
  footer { text-align: center; padding: 32px; font-size: 0.85rem; color: #999; border-top: 1px solid #eee; margin-top: 48px; }
  @media (max-width: 600px) { .card { flex-direction: column; } .card iframe { width: 100%; height: 400px; } }
</style>
</head>
<body>
<header>
  <h1>🟡 Yello Explains</h1>
  <p>Learn something wild about your body every day.</p>
</header>
<section class="episodes">
  <h2>Episodes</h2>
  <div id="episodes-container"></div>
</section>
<footer>
  <p>© 2026 Yello Explains · <a href="https://www.youtube.com/@YelloExplains" style="color:#F5C518">YouTube</a> · <a href="terms.html" style="color:#F5C518">Terms</a> · <a href="privacy.html" style="color:#F5C518">Privacy</a></p>
</footer>
<script>
fetch('episodes.json').then(r=>r.json()).then(eps=>{
  const c = document.getElementById('episodes-container');
  eps.reverse().forEach(ep=>{
    c.innerHTML += `
    <div class="card">
      <iframe src="https://www.youtube.com/embed/${ep.video_id}" allowfullscreen></iframe>
      <div class="card-body">
        <span class="topic">${ep.topic.replace(/-/g,' ').toUpperCase()}</span>
        <h3>${ep.title}</h3>
        <p>${ep.knowledge}</p>
        <a href="https://www.youtube.com/shorts/${ep.video_id}" target="_blank">Watch on YouTube ↗</a>
      </div>
    </div>`;
  });
});
</script>
</body>
</html>
